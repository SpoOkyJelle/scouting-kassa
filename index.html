<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🥞 Scouting Pannenkoekenactie</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ─── HEADER ────────────────────────────────── -->
<header class="header">
  <h1>🥞 Pannenkoekenactie</h1>
  <p>Scouting Bestelapp</p>
</header>

<!-- ─── TABS ──────────────────────────────────── -->
<nav class="tabs">
  <div class="tab active" id="tab-btn-nieuw" onclick="showPage('nieuw')">
    <span class="tab-icon">📝</span>Nieuwe Bon
  </div>
  <div class="tab" id="tab-btn-bonnen" onclick="showPage('bonnen')">
    <span class="tab-icon">🧾</span>Bonnen
  </div>
  <div class="tab" id="tab-btn-overzicht" onclick="showPage('overzicht')">
    <span class="tab-icon">📊</span>Overzicht
  </div>
</nav>

<!-- ════════════════════════════════════════════
     PAGINA 1 · NIEUWE BON
════════════════════════════════════════════ -->
<div class="page active" id="page-nieuw">

  <div class="card">
    <div class="card-title">Klantgegevens</div>
    <label for="inp-naam">Naam / Omschrijving *</label>
    <input type="text" id="inp-naam" placeholder="Bijv. Tafel 3 of Jan de Vries" />
    <div style="margin-top: 10px;">
      <label for="inp-opmerking">Opmerking (optioneel)</label>
      <textarea id="inp-opmerking" placeholder="Bijv. geen suiker, extra knapperig…"></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Pannenkoek toevoegen</div>
    <div class="types-grid" id="types-grid"></div>

    <div class="qty-row">
      <span class="qty-label" id="qty-label">Selecteer een soort</span>
      <div class="qty-controls">
        <button class="qty-btn" id="btn-minus" onclick="changeQty(-1)" disabled>−</button>
        <span class="qty-display" id="qty-display">1</span>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>

    <button class="btn-add" id="btn-add-item" onclick="addItem()" disabled>
      ＋ Voeg toe aan bon
    </button>
  </div>

  <div class="card">
    <div class="card-title">Huidige bon</div>
    <div id="current-items"></div>
    <div id="save-section" style="display: none;">
      <div class="divider"></div>
      <div class="bon-total-row">
        <span class="bon-total-label">Totaal pannenkoeken:</span>
        <span class="bon-total-count" id="bon-subtotal">0</span>
      </div>
      <button class="btn-save" onclick="saveBon()">✓ Bon opslaan</button>
    </div>
  </div>

</div>

<!-- ════════════════════════════════════════════
     PAGINA 2 · BONNEN
════════════════════════════════════════════ -->
<div class="page" id="page-bonnen">

  <div class="search-row">
    <input class="search-input" type="text" id="inp-search"
           placeholder="🔍 Zoek op naam…" oninput="renderBonnen()" />
  </div>

  <div class="filter-row">
    <button class="filter-btn active" data-f="alle"    onclick="setFilter('alle')">Alle</button>
    <button class="filter-btn"        data-f="open"    onclick="setFilter('open')">Open</button>
    <button class="filter-btn"        data-f="betaald" onclick="setFilter('betaald')">Betaald</button>
  </div>

  <div id="bonnen-list"></div>

</div>

<!-- ════════════════════════════════════════════
     PAGINA 3 · OVERZICHT
════════════════════════════════════════════ -->
<div class="page" id="page-overzicht">

  <div class="stats-grid">
    <div class="stat-box s-total">
      <div class="stat-num" id="s-total">0</div>
      <div class="stat-label">Totaal bonnen</div>
    </div>
    <div class="stat-box s-open">
      <div class="stat-num" id="s-open">0</div>
      <div class="stat-label">Open</div>
    </div>
    <div class="stat-box s-paid">
      <div class="stat-num" id="s-paid">0</div>
      <div class="stat-label">Betaald</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🥞 Pannenkoeken per soort</div>
    <div id="breakdown-list"></div>
  </div>

  <div class="grand-total-bar">
    <span class="label">🥞 Totaal pannenkoeken</span>
    <span class="num" id="grand-total">0</span>
  </div>

</div>

<!-- ─── TOAST ──────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ─── SCRIPTS ────────────────────────────────── -->
<script src="js/app.js"></script>

</body>
</html>
