<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scouting — Pannenkoekenactie</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ─── HEADER ───────────────────────────────── -->
<header class="header">
  <div class="header-inner">
    <span class="header-label">Scouting</span>
    <h1>Pannenkoekenactie</h1>
  </div>
</header>

<!-- ─── TABS ─────────────────────────────────── -->
<nav class="tabs">
  <button class="tab active" id="tab-btn-nieuw"     onclick="showPage('nieuw')">Nieuwe bon</button>
  <button class="tab"        id="tab-btn-bonnen"    onclick="showPage('bonnen')">Bonnen</button>
  <button class="tab"        id="tab-btn-overzicht" onclick="showPage('overzicht')">Overzicht</button>
  <button class="tab"        id="tab-btn-producten" onclick="showPage('producten')">Producten</button>
</nav>

<!-- ════════════════════════════════════════════
     PAGINA 1 · NIEUWE BON
════════════════════════════════════════════ -->
<div class="page active" id="page-nieuw">

  <div class="edit-banner" id="edit-banner" style="display: none;">
    <div class="edit-banner-left">
      <span class="edit-banner-dot"></span>
      <span id="edit-banner-text">Bon #0 bewerken</span>
    </div>
    <button class="edit-banner-cancel" onclick="cancelEdit()">Annuleer</button>
  </div>

  <div class="card">
    <div class="card-title">Klantgegevens</div>
    <div class="field">
      <label for="inp-naam">Naam of omschrijving</label>
      <input type="text" id="inp-naam" placeholder="Bijv. Tafel 3 of Jan de Vries" />
    </div>
    <div class="field">
      <label for="inp-opmerking">Opmerking <span class="optional">(optioneel)</span></label>
      <textarea id="inp-opmerking" placeholder="Bijv. geen suiker, extra knapperig…"></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Tik om toe te voegen</div>
    <div class="types-grid" id="types-grid"></div>
    <p class="types-hint" id="types-hint" style="display:none;">
      Nog geen producten. Voeg ze toe via het tabblad <strong>Producten</strong>.
    </p>
  </div>

  <div class="card" id="bon-card" style="display: none;">
    <div class="card-title">Huidige bon</div>
    <div id="current-items"></div>
    <div class="divider"></div>
    <div class="bon-total-row">
      <span class="bon-total-label">Totaal</span>
      <span class="bon-total-count" id="bon-subtotal">0</span>
    </div>
    <button class="btn-save" id="btn-save" onclick="saveBon()">Bon opslaan</button>
  </div>

</div>

<!-- ════════════════════════════════════════════
     PAGINA 2 · BONNEN
════════════════════════════════════════════ -->
<div class="page" id="page-bonnen">

  <div class="search-row">
    <input class="search-input" type="text" id="inp-search"
           placeholder="Zoek op naam…" oninput="renderBonnen()" />
  </div>

  <div class="filter-row">
    <button class="filter-btn"        data-f="alle"    onclick="setFilter('alle')">Alle</button>
    <button class="filter-btn active" data-f="open"    onclick="setFilter('open')">Open</button>
    <button class="filter-btn"        data-f="betaald" onclick="setFilter('betaald')">Betaald</button>
  </div>

  <div id="bonnen-list"></div>

</div>

<!-- ════════════════════════════════════════════
     PAGINA 3 · OVERZICHT
════════════════════════════════════════════ -->
<div class="page" id="page-overzicht">

  <div class="stats-grid">
    <div class="stat-box s-total">
      <div class="stat-num" id="s-total">0</div>
      <div class="stat-label">Bonnen</div>
    </div>
    <div class="stat-box s-open">
      <div class="stat-num" id="s-open">0</div>
      <div class="stat-label">Open</div>
    </div>
    <div class="stat-box s-paid">
      <div class="stat-num" id="s-paid">0</div>
      <div class="stat-label">Betaald</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Pannenkoeken per soort</div>
    <div id="breakdown-list"></div>
  </div>

  <div class="total-bar">
    <span class="total-bar-label">Totaal pannenkoeken</span>
    <span class="total-bar-num" id="grand-total">0</span>
  </div>

</div>

<!-- ════════════════════════════════════════════
     PAGINA 4 · PRODUCTEN
════════════════════════════════════════════ -->
<div class="page" id="page-producten">

  <div class="card">
    <div class="card-title">Nieuw product toevoegen</div>
    <div class="product-add-row">
      <input type="text" id="inp-product" placeholder="Bijv. Bacon &amp; kaas"
             maxlength="40" onkeydown="if(event.key==='Enter') addProduct()" />
      <button class="btn-product-add" onclick="addProduct()">Toevoegen</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Huidige producten</div>
    <div id="producten-list"></div>
  </div>

</div>

<!-- ─── TOAST ─────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ─── SCRIPTS ──────────────────────────────── -->
<script src="js/app.js"></script>

</body>
</html>
